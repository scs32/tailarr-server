<!-- @dsCard group="Feedback" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Install progress</title><link rel="stylesheet" href="../tailarr.css"></head>
<body><div class="preview">
  <div class="card" style="width:100%;max-width:440px;padding:var(--sp-6)">
    <div class="dialog__title" style="margin-bottom:var(--sp-5)">Starting jellyfin…</div>
    <div class="steps">
      <div class="step step--done">
        <span class="step__dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
        <div><div class="step__label">Pod generated</div><div class="step__sub">create.sh · run.sh / stop.sh written</div></div>
      </div>
      <div class="step step--active">
        <span class="step__dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.2-8.6"/></svg></span>
        <div><div class="step__label">Pulling image</div><div class="step__sub">ghcr.io/jellyfin/jellyfin:latest — 214 MB</div></div>
      </div>
      <div class="step step--pending">
        <span class="step__dot"></span>
        <div><div class="step__label">Enroll on tailnet</div></div>
      </div>
      <div class="step step--pending">
        <span class="step__dot"></span>
        <div><div class="step__label">Serve HTTPS</div></div>
      </div>
    </div>
  </div>
</div></body></html>
