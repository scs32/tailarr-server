<!-- @dsCard group="Pods" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pod card</title><link rel="stylesheet" href="../tailarr.css"></head>
<body><div class="preview">
  <div class="grid" style="width:100%;max-width:680px">

    <div class="pod-card card">
      <div class="pod-card__head">
        <div class="pod-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg></div>
        <div><div class="pod-card__title">sonarr</div><a class="pod-card__url">sonarr.tailde95ff.ts.net ↗</a></div>
        <div class="spacer"></div>
        <span class="badge badge--running">Running</span>
      </div>
      <div class="pod-card__foot">
        <button class="btn btn--secondary btn--sm">Stop</button>
        <button class="btn btn--ghost btn--sm">Logs</button>
        <button class="btn btn--ghost btn--sm">Update</button>
        <div class="spacer"></div>
        <span class="preview-label">media share</span>
      </div>
    </div>

    <div class="pod-card card">
      <div class="pod-card__head">
        <div class="pod-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
        <div><div class="pod-card__title">radarr</div><a class="pod-card__url">radarr.tailde95ff.ts.net ↗</a></div>
        <div class="spacer"></div>
        <span class="badge badge--stopped">Stopped</span>
      </div>
      <div class="pod-card__foot">
        <button class="btn btn--primary btn--sm">Start</button>
        <button class="btn btn--ghost btn--sm">Logs</button>
        <button class="btn btn--danger btn--sm">Remove</button>
      </div>
    </div>

  </div>
</div></body></html>
