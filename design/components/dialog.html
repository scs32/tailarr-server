<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirm dialog</title><link rel="stylesheet" href="../podscale.css"></head>
<body style="min-height:340px">
  <div class="scrim" style="position:relative;min-height:340px">
    <div class="dialog card">
      <div class="dialog__title">Remove radarr?</div>
      <p class="dialog__body">This stops the pod and deletes its generated scripts. The pod's config directory and tailnet identity are kept unless you remove them separately.</p>
      <div class="dialog__foot">
        <button class="btn btn--ghost">Cancel</button>
        <button class="btn btn--danger">Remove pod</button>
      </div>
    </div>
  </div>
</body></html>
