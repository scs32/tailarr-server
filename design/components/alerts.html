<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alerts & toasts</title><link rel="stylesheet" href="../tailarr.css"></head>
<body><div class="preview">
  <div style="width:100%;max-width:520px;display:flex;flex-direction:column;gap:var(--sp-3)">
    <div class="alert alert--ok"><svg class="alert__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg><div><strong>Installed.</strong> radarr generated — start it to pull the image and enroll on the tailnet.</div></div>
    <div class="alert alert--info"><svg class="alert__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><div>Starting pulls the image and enrolls on the tailnet — it can take a few minutes on first run.</div></div>
    <div class="alert alert--err"><svg class="alert__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg><div><strong>Install failed.</strong> create.sh exited 1 — no auth key provided for a Tailscale-enabled pod.</div></div>
    <span class="preview-label">Toast (floating)</span>
    <div class="alert alert--ok toast"><svg class="alert__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg><div>sonarr started.</div></div>
  </div>
</div></body></html>
