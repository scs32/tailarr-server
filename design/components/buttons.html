<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Buttons</title><link rel="stylesheet" href="../tailarr.css"></head>
<body><div class="preview">
  <span class="preview-label">Variants</span>
  <div class="preview-row">
    <button class="btn btn--primary">Install</button>
    <button class="btn btn--secondary">Stop</button>
    <button class="btn btn--ghost">Logs</button>
    <button class="btn btn--danger">Remove</button>
  </div>
  <span class="preview-label">Small (in-card actions)</span>
  <div class="preview-row">
    <button class="btn btn--primary btn--sm">Start</button>
    <button class="btn btn--secondary btn--sm">Stop</button>
    <button class="btn btn--ghost btn--sm">Update</button>
  </div>
  <span class="preview-label">Loading / disabled</span>
  <div class="preview-row">
    <button class="btn btn--primary btn--loading"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.2-8.6"/></svg>Starting…</button>
    <button class="btn btn--secondary" disabled>Disabled</button>
  </div>
</div></body></html>
