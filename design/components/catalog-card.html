<!-- @dsCard group="Catalog" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalog card</title><link rel="stylesheet" href="../tailarr.css"></head>
<body><div class="preview">
  <div class="grid" style="width:100%;max-width:680px">

    <div class="catalog-card card">
      <div class="catalog-card__head">
        <div class="pod-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v12H4z"/><path d="M2 20h20"/></svg></div>
        <div><div class="pod-card__title" style="font-size:var(--fs-base)">uptime-kuma</div><span class="chip">port 3001</span></div>
        <div class="spacer"></div>
        <button class="btn btn--primary btn--sm">Install</button>
      </div>
      <div class="catalog-card__meta">louislam/uptime-kuma:1</div>
    </div>

    <div class="catalog-card card">
      <div class="catalog-card__head">
        <div class="pod-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg></div>
        <div><div class="pod-card__title" style="font-size:var(--fs-base)">sonarr</div><span class="chip chip--installed">Installed</span></div>
        <div class="spacer"></div>
        <button class="btn btn--secondary btn--sm">Reinstall</button>
      </div>
      <div class="catalog-card__meta">lscr.io/linuxserver/sonarr:latest</div>
    </div>

  </div>
</div></body></html>
