<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Empty state</title><link rel="stylesheet" href="../tailarr.css"></head>
<body><div class="preview">
  <div class="empty" style="width:100%;max-width:520px">
    <svg class="empty__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <div class="empty__title">No pods deployed yet</div>
    <p style="margin:0 0 var(--sp-5)">Install a service from the catalog, or spin up any OCI image as a custom pod.</p>
    <div class="preview-row" style="justify-content:center">
      <button class="btn btn--primary">Browse catalog</button>
      <button class="btn btn--secondary">+ Custom pod</button>
    </div>
  </div>
</div></body></html>
